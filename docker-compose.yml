version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: club_management_backend
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: mongodb+srv://aneekdestiny_db_user:HMLbjcpuo3fy0D0h@cluster0.3yhufbe.mongodb.net/club-management?retryWrites=true&w=majority&appName=Cluster0
      SESSION_SECRET: club_management_production_secret_key_2024
      NODE_ENV: production
      PORT: 5000
      CORS_ORIGIN: http://localhost:3000
      BEHIND_PROXY: "true"
    networks:
      - club_network
    restart: unless-stopped
    healthcheck:
      test: curl -f http://localhost:5000/api/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: club_management_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:5000
    networks:
      - club_network
    restart: unless-stopped

networks:
  club_network:
    driver: bridge
